# notes-helper — unified i18n catalog (GUI strings AND LLM prompts, one file).
# =============================================================================
# Follows the front-ui convention: every translatable string — interface labels
# and model prompts alike — lives here, never inlined in Python/JS. Add a language
# by adding a key under each entry; nothing in the code changes.
#
# Language is DISCOVERED, never assumed. The report/GUI language is the DOMINANT
# language, resolved by `notes_helper.i18n`:
#   1. from the associated TEXT when present (langdetect; if several languages, the
#      majority wins);
#   2. otherwise, when there is only audio, from the MAJORITY language of the audio
#      (the LID stage segments the audio into per-language regions and we take the
#      longest-lasting one). On a transcript the two agree.
# The spoken language of the audio is likewise auto-detected per turn (whisper
# "auto"). Supported UI languages so far: fr, en, es (fallback order: asked → en →
# fr → any).
# =============================================================================

# ---------------------------------------------------------------------------
